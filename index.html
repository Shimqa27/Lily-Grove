<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЛИЛИЕВАЯ РОЩА</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --lilac:#efe6ff;
    --violet:#cdb7ff;
    --gold:#e4c777;
    --paper:#fffdf5;
    --ink:#5b4b4b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Cormorant Garamond',serif;
    background:
        radial-gradient(circle at top left,#ffffff 0%,#f3eaff 40%,#e8d8ff 100%);
    color:var(--ink);
    overflow-x:hidden;
}

/* Эмодзи сверху и снизу */
body::before{
    content:"⚜ ❀ ⚜ ❁ ⚜ ❀ ⚜";
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    font-size:22px;
    color:rgba(212,180,90,0.15); /* более прозрачные */
    letter-spacing:25px;
    pointer-events:none;
    z-index:0;
}

body::after{
    content:"❀ ⚜ ❁ ⚜ ❀ ⚜ ❁";
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:22px;
    color:rgba(212,180,90,0.15);
    letter-spacing:25px;
    pointer-events:none;
    z-index:0;
}

/* Свиток */
.scroll{
    max-width:950px;
    margin:100px auto;
    background:var(--paper);
    padding:80px 60px;
    border-radius:30px;
    box-shadow:
        0 30px 60px rgba(0,0,0,0.15),
        inset 0 0 80px rgba(0,0,0,0.05);
    position:relative;
    overflow:hidden;
}

/* Орнамент свитка */
.scroll::before,
.scroll::after{
    content:"✧ ✧ ✧ ✧ ✧";
    position:absolute;
    width:100%;
    text-align:center;
    color:var(--gold);
}

.scroll::before{ top:20px; }
.scroll::after{ bottom:20px; }

/* Заголовок */
h1{
    font-family:'Great Vibes',cursive;
    font-size:4.5rem;
    text-align:center;
    color:#b48eff;
    word-break: break-word;
}

.subtitle{
    text-align:center;
    font-size:1.3rem;
    color:#8b6bbf;
    margin-bottom:30px;
}

/* Музыка */
.music{
    text-align:center;
    margin-bottom:40px;
}

audio{
    width:100%;
    max-width:400px;
}

/* Главы */
.chapter-title{
    font-family:'Great Vibes',cursive;
    font-size:2.2rem;
    color:#b48eff;
    margin-top:50px;
    margin-bottom:20px;
    text-align:center;
    word-break: break-word;
}

.letter{
    font-size:1.25rem;
    line-height:1.8;
    text-align:justify;
}

/* Иллюстрации */
.illustration{
    margin:30px auto 10px auto;
    height:350px;
    border-radius:20px;
    border:2px dashed var(--violet);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-family:'Great Vibes',cursive;
    font-size:1.6rem;
    color:#b48eff;
    background:rgba(255,255,255,0.4);
    overflow:hidden;
}

/* Адаптация изображений */
.illustration img{
    width:100%;
    height:100%;
    object-fit:cover; 
    border-radius:18px;
}

/* Подпись */
.signature{
    margin-top:60px;
    text-align:right;
    font-family:'Great Vibes',cursive;
    font-size:2rem;
    color:#b48eff;
}

/* Адаптив */
@media(max-width:1024px){
    .scroll{
        padding:60px 40px;
        margin:50px auto;
    }
    h1{ font-size:3.5rem; }
    .chapter-title{ font-size:2rem; }
    .letter{ font-size:1.15rem; line-height:1.7; }
    .illustration{ height:300px; }
}

@media(max-width:768px){
    .scroll{
        padding:40px 20px;
        margin:30px 10px;
    }
    h1{ font-size:2.5rem; }
    .subtitle{ font-size:1.1rem; }
    .chapter-title{ font-size:1.8rem; }
    .letter{ font-size:1rem; line-height:1.6; }
    .illustration{ height:220px; }
    audio{ max-width:100%; }
}

@media(max-width:480px){
    h1{ font-size:2rem; }
    .chapter-title{ font-size:1.6rem; }
    .letter{ font-size:0.95rem; line-height:1.5; }
    .illustration{ height:180px; }
}
</style>
</head>

<body>

<div class="scroll">

<h1>ЛИЛИЕВАЯ РОЩА</h1>
<div class="subtitle">Письмо, написанное сердцем · 8 Марта</div>

<div class="music">
    <audio controls>
        <source src="music\The Stranglers - Golden Brown - Slowed Down Version.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>
</div>

<div class="letter">
<div class="chapter-title">Глава I</div>
<p>Текст главы...</p>
<div class="illustration">
    <img src="img/cd5c492d-0062-4b91-82f3-361a7387a91b.png" alt="Иллюстрация к Главе I">
</div>

<div class="chapter-title">Глава II</div>
<p>Текст главы...</p>
<div class="illustration">
    <img src="img/2af4333a-068c-419a-8579-86ad0a569d5e.png" alt="Иллюстрация к Главе II">
</div>

<div class="chapter-title">Глава III</div>
<p>Текст главы...</p>
<div class="illustration">
    <img src="img/глава3.png" alt="Иллюстрация к Главе III">
</div>

<div class="chapter-title">Глава IV</div>
<p>Текст главы...</p>
<div class="illustration">
    <img src="img/глава4.png" alt="Иллюстрация к Главе IV">
</div>

<div class="chapter-title">Конец</div>
<p>Текст главы...</p>
<div class="illustration">
    <img src="img/конец.png" alt="Иллюстрация к The end">
</div>

<p style="margin-top:40px;text-align:center;font-size:1.4rem;color:#8b6bbf;">
С 8 Марта 💐</p>

</div>

<div class="signature">
С любовью.
</div>

</div>

</body>
</html>
